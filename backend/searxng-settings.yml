use_default_settings: true

general:
  debug: false
  instance_name: "ChatForge Search"
  enable_metrics: false
  donation_url: false

server:
  port: 8888
  bind_address: "127.0.0.1"
  secret_key: "!!changeme-chatforge-searxng-initial"
  limiter: false
  public_instance: false
  image_proxy: false
  method: "GET"

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

ui:
  static_path: ""
  templates_path: ""
  default_theme: simple
  default_locale: "en"

outgoing:
  request_timeout: 5.0
  max_request_timeout: 10.0
  enable_http2: true
  useragent_suffix: " (ChatForge/1.0; +https://chatforge.app)"

valkey:
  url: false
